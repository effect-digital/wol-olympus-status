#
# ===============================
# Effect Digital customisation
# ===============================
#
# The scheduled trigger has been REMOVED. "upptime/updates" bumps the Upptime
# version and regenerates every workflow from the upstream template, which would
# revert the Effect CI Bot (GitHub App) authentication added to the other
# workflows. This job is left available via manual dispatch only - run it
# knowingly, and re-apply the app-token customisation afterwards.
#
# 🔼 Upptime @v1.41.3
# GitHub-powered open-source uptime monitor and status page by Anand Chowdhary

# * Source: https://github.com/upptime/upptime
# * Docs and more: https://upptime.js.org
# * More by Anand Chowdhary: https://anandchowdhary.com


name: Updates CI
on:
  repository_dispatch:
    types: [updates]
  workflow_dispatch:
jobs:
  release:
    name: Deploy updates
    runs-on: ubuntu-latest
    steps:
      - name: Generate Effect CI Bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.EFFECT_CI_APP_ID }}
          private-key: ${{ secrets.EFFECT_CI_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Update code
        uses: upptime/updates@master
        env:
          GH_PAT: ${{ steps.app-token.outputs.token }}
