#
# ===============================
# Effect Digital customisation
# ===============================
#
# This file is based on the Upptime template but has been customised to push
# using the "Effect CI Bot" GitHub App (vars.EFFECT_CI_APP_ID +
# secrets.EFFECT_CI_PRIVATE_KEY) instead of a personal access token (GH_PAT).
# The "Update template" step has been removed so that editing .upptimerc.yml no
# longer regenerates (and reverts) these customised workflows.
#
# 🔼 Upptime @v1.41.3
# GitHub-powered open-source uptime monitor and status page by Anand Chowdhary

# * Source: https://github.com/upptime/upptime
# * Docs and more: https://upptime.js.org
# * More by Anand Chowdhary: https://anandchowdhary.com


name: Setup CI
on:
  push:
    paths:
      - ".upptimerc.yml"
  repository_dispatch:
    types: [setup]
  workflow_dispatch:
jobs:
  release:
    name: Setup Upptime
    runs-on: ubuntu-latest
    steps:
      - name: Generate Effect CI Bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.EFFECT_CI_APP_ID }}
          private-key: ${{ secrets.EFFECT_CI_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Update response time
        uses: upptime/uptime-monitor@v1.41.3
        with:
          command: "response-time"
        env:
          GH_PAT: ${{ steps.app-token.outputs.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
      - name: Update summary in README
        uses: upptime/uptime-monitor@v1.41.3
        with:
          command: "readme"
        env:
          GH_PAT: ${{ steps.app-token.outputs.token }}
      - name: Generate graphs
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Graphs CI
          token: ${{ steps.app-token.outputs.token }}
      - name: Generate site
        uses: upptime/uptime-monitor@v1.41.3
        with:
          command: "site"
        env:
          GH_PAT: ${{ steps.app-token.outputs.token }}
      - uses: peaceiris/actions-gh-pages@v4
        name: GitHub Pages Deploy
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          publish_dir: "site/status-page/__sapper__/export/"
          force_orphan: "false"
          user_name: "Upptime Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"
