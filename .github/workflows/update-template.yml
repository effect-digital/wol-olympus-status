#
# ===============================
# Effect Digital customisation
# ===============================
#
# The scheduled trigger has been REMOVED. Running "update-template" regenerates
# every workflow from the upstream Upptime template, which would revert the
# Effect CI Bot (GitHub App) authentication added to the other workflows.
# This job is left available via manual dispatch only - run it knowingly, and
# re-apply the app-token customisation afterwards.
#
# 🔼 Upptime @v1.41.3
# GitHub-powered open-source uptime monitor and status page by Anand Chowdhary

# * Source: https://github.com/upptime/upptime
# * Docs and more: https://upptime.js.org
# * More by Anand Chowdhary: https://anandchowdhary.com


name: Update Template CI
on:
  repository_dispatch:
    types: [update_template]
  workflow_dispatch:
jobs:
  release:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Generate Effect CI Bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.EFFECT_CI_APP_ID }}
          private-key: ${{ secrets.EFFECT_CI_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Update template
        uses: upptime/uptime-monitor@master
        with:
          command: "update-template"
        env:
          GH_PAT: ${{ steps.app-token.outputs.token }}
